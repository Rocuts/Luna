<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8633"/>
      <stop offset="100%" style="stop-color:#fc630a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Microphone icon -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mic body -->
    <rect x="-40" y="-100" width="80" height="140" rx="40" fill="white" fill-opacity="0.95" stroke="none"/>
    <!-- Mic arc -->
    <path d="M-70,20 a70,70 0 0,0 140,0" fill="none" stroke="white" stroke-opacity="0.9"/>
    <!-- Mic stem -->
    <line x1="0" y1="90" x2="0" y2="130" stroke="white" stroke-opacity="0.9"/>
    <line x1="-35" y1="130" x2="35" y2="130" stroke="white" stroke-opacity="0.9"/>
  </g>
  <!-- Luna text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="72" fill="white" fill-opacity="0.95">LUNA</text>
</svg>
